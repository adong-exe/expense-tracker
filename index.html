
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的專屬記帳</title>
  <style>
    /* 手機版面美化設定 */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
    .container { max-width: 400px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; margin-top: 0; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    button:active { background-color: #218838; }
    #status { text-align: center; margin-top: 15px; font-weight: bold; color: #007bff; }
  </style>
</head>
<body>

<div class="container">
  <h2>記一筆 ✍️</h2>
  <form id="expenseForm">
    <div class="form-group">
      <label for="date">日期</label>
      <input type="date" id="date" name="Date" required>
    </div>

    <div class="form-group">
      <label for="type">收支類型</label>
      <select id="type" name="Type" required>
        <option value="" disabled selected>請選擇...</option>
        <option value="支出">支出</option>
        <option value="收入">收入</option>
      </select>
    </div>

    <div class="form-group">
      <label for="category">大類別</label>
      <select id="category" name="Category" required disabled>
        <option value="" disabled selected>請先選擇收支類型</option>
      </select>
    </div>

    <div class="form-group">
      <label for="item">次項目</label>
      <select id="item" name="Item" required disabled>
        <option value="" disabled selected>請先選擇大類別</option>
      </select>
    </div>

    <div class="form-group">
      <label for="name">明細名稱</label>
      <input type="text" id="name" name="Name" placeholder="例如：排骨便當" required>
    </div>

    <div class="form-group">
      <label for="amount">金額</label>
      <input type="number" id="amount" name="Amount" placeholder="0" required>
    </div>

    <div class="form-group">
      <label for="notes">備註 (選填)</label>
      <input type="text" id="notes" name="Notes" placeholder="有什麼想補充的嗎？">
    </div>

    <button type="submit" id="submitBtn">送出紀錄</button>
  </form>
  <div id="status"></div>
</div>

<script>
  // 1. 定義你的三層分類資料庫 (你可以自由修改這裡的項目)
  const categoryData = {
    "支出": {
      "餐飲": ["早餐", "午餐", "晚餐", "飲料零食"],
      "交通": ["捷運/公車", "計程車", "加油", "停車費"],
      "生活": ["日用品", "水電瓦斯", "電信費"],
      "娛樂": ["電影", "訂閱服務", "聚餐"]
    },
    "收入": {
      "工作": ["本薪", "獎金", "加班費"],
      "投資": ["股息", "利息", "資本利得"]
    }
  };

  // 抓取畫面上的選單元素
  const typeSelect = document.getElementById('type');
  const categorySelect = document.getElementById('category');
  const itemSelect = document.getElementById('item');

  // 預設日期為今天
  document.getElementById('date').valueAsDate = new Date();

  // 2. 當「收支類型」改變時，更新「大類別」
  typeSelect.addEventListener('change', function() {
    const selectedType = this.value;
    categorySelect.innerHTML = '<option value="" disabled selected>請選擇大類別...</option>';
    itemSelect.innerHTML = '<option value="" disabled selected>請先選擇大類別</option>';
    itemSelect.disabled = true;

    if (selectedType) {
      categorySelect.disabled = false;
      const categories = Object.keys(categoryData[selectedType]);
      categories.forEach(cat => {
        categorySelect.innerHTML += `<option value="${cat}">${cat}</option>`;
      });
    }
  });

  // 3. 當「大類別」改變時，更新「次項目」
  categorySelect.addEventListener('change', function() {
    const selectedType = typeSelect.value;
    const selectedCategory = this.value;
    itemSelect.innerHTML = '<option value="" disabled selected>請選擇次項目...</option>';

    if (selectedCategory) {
      itemSelect.disabled = false;
      const items = categoryData[selectedType][selectedCategory];
      items.forEach(item => {
        itemSelect.innerHTML += `<option value="${item}">${item}</option>`;
      });
    }
  });

  // 4. 表單送出邏輯 (與 Google 試算表對接)
  const form = document.getElementById('expenseForm');
  const statusDiv = document.getElementById('status');
  const submitBtn = document.getElementById('submitBtn');

  // 🔴 請在這裡貼上你從 Google Apps Script 取得的網址！
  const scriptURL = 'https://script.google.com/macros/s/AKfycbz9o6Df07Ys0UFIKHoRuBrRVyCVOJi64ZkrASRL3nCdet8w8YjWP0MbO8LtmJ0U9OTT/exec'; 

  form.addEventListener('submit', e => {
    e.preventDefault(); // 防止網頁重新載入
    submitBtn.disabled = true;
    submitBtn.innerText = '傳送中...';
    statusDiv.innerText = '';

    // 收集表單資料
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    // 使用 fetch API 傳送資料到 Google 試算表
    // 技巧：使用 text/plain 避免跨網域 (CORS) 問題
    fetch(scriptURL, { 
      method: 'POST', 
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
      statusDiv.innerText = '✅ 記帳成功！';
      statusDiv.style.color = 'green';
      form.reset(); // 清空表單
      document.getElementById('date').valueAsDate = new Date(); // 日期重設為今天
      categorySelect.innerHTML = '<option value="" disabled selected>請先選擇收支類型</option>';
      categorySelect.disabled = true;
      itemSelect.innerHTML = '<option value="" disabled selected>請先選擇大類別</option>';
      itemSelect.disabled = true;
      submitBtn.disabled = false;
      submitBtn.innerText = '送出紀錄';
      
      // 3秒後清除成功訊息
      setTimeout(() => { statusDiv.innerText = ''; }, 3000);
    })
    .catch(error => {
      console.error('Error!', error.message);
      statusDiv.innerText = '❌ 傳送失敗，請檢查網路或網址。';
      statusDiv.style.color = 'red';
      submitBtn.disabled = false;
      submitBtn.innerText = '重新送出';
    });
  });
</script>

</body>
</html>
